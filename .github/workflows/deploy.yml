name: Deploy

on:
  push:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  build-and-deploy:
    runs-on: ubuntu-24.04-arm
    needs: test

    permissions:
      contents: read
      packages: write

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository_owner }}/goledger-tv

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to Elastic Beanstalk
        run: |
          cat > Dockerrun.aws.json <<EOF
          {
            "AWSEBDockerrunVersion": "1",
            "Image": {
              "Name": "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest",
              "Update": "true"
            },
            "Ports": [
              {
                "ContainerPort": 80,
                "HostPort": 80
              }
            ]
          }
          EOF

          zip deploy.zip Dockerrun.aws.json

          VERSION="deploy-${{ github.sha }}"
          BUCKET=$(aws elasticbeanstalk create-storage-location --query S3Bucket --output text)

          aws s3 cp deploy.zip "s3://$BUCKET/$VERSION.zip"

          aws elasticbeanstalk create-application-version \
            --application-name goledger-tv \
            --version-label "$VERSION" \
            --source-bundle S3Bucket="$BUCKET",S3Key="$VERSION.zip"

          aws elasticbeanstalk update-environment \
            --application-name goledger-tv \
            --environment-name goledger-tv-env \
            --version-label "$VERSION" \
            --option-settings \
              Namespace=aws:elasticbeanstalk:application:environment,OptionName=VITE_API_BASE_URL,Value="${{ secrets.VITE_API_BASE_URL }}" \
              Namespace=aws:elasticbeanstalk:application:environment,OptionName=VITE_TMDB_API_KEY,Value="${{ secrets.VITE_TMDB_API_KEY }}"
